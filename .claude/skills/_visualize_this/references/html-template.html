<!doctype html>
<!--
  _visualize_this — standalone HTML study sheet.

  RENDERING (read this — the #1 failure is a sheet that shows raw text):
  - Uses the classic UMD Mermaid build via a normal <script src> (NOT an ESM
    `import` / `<script type="module">`). ESM modules fail to load when the page
    is opened by double-click (file://) on locked-down machines — that's what
    leaves diagrams un-rendered.
  - Loads a VENDORED ./mermaid.min.js first (works fully offline), and falls
    back to the CDN only if the local file is missing. To vendor it once:
      Invoke-WebRequest https://cdn.jsdelivr.net/npm/mermaid@10.9.3/dist/mermaid.min.js -OutFile mermaid.min.js
    (or: curl -L -o mermaid.min.js https://cdn.jsdelivr.net/npm/mermaid@10.9.3/dist/mermaid.min.js)
  - Put Mermaid source FLUSH-LEFT inside <pre class="mermaid"> (no indentation).
  - QUOTE any node label containing punctuation: A["Awareness: hear it"] — an
    unquoted colon/paren is a parse error and the diagram won't draw.

  To reuse: edit <title>, <header>, and the <section> blocks. One <section> per
  diagram. Keep the two <script> blocks at the bottom exactly as they are.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font: 16px/1.6 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    max-width: 60rem; margin: 2rem auto; padding: 0 1.25rem;
    color: #1a1a1a; background: #fff;
  }
  @media (prefers-color-scheme: dark) {
    body { color: #e6e6e6; background: #15171a; }
    .source { color: #9aa0a6; } .notice { color: #b9c0c7; } section { border-color: #2a2e33; }
  }
  header { border-bottom: 2px solid currentColor; padding-bottom: .75rem; margin-bottom: 1.5rem; }
  h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
  .source { font-size: .85rem; color: #666; }
  section { border: 1px solid #e2e2e2; border-radius: 10px; padding: 1rem 1.25rem; margin: 1.5rem 0; }
  h2 { font-size: 1.15rem; margin: 0 0 .75rem; }
  pre.mermaid { text-align: center; background: none; border: 0; }
  .notice { font-size: .9rem; color: #555; margin-top: .75rem; font-style: italic; }
  .err { color: #b00; font-size: .85rem; }
  footer { margin-top: 2rem; font-size: .8rem; color: #888; }
  @media print { body { max-width: none; margin: 0; } section { break-inside: avoid; border-color: #ccc; } }
</style>
</head>
<body>
  <header>
    <h1>{{TITLE}}</h1>
    <div class="source">{{SOURCE}} · generated {{DATE}}</div>
  </header>

  <!-- One <section> per diagram. Duplicate as needed. Mermaid source FLUSH-LEFT. -->
  <section>
    <h2>{{DIAGRAM_TITLE}}</h2>
<pre class="mermaid">
{{MERMAID_SOURCE}}
</pre>
    <p class="notice">What to notice: {{CAPTION}}</p>
  </section>

  <footer>Generated by _visualize_this.</footer>

  <script>
    function startMermaid() {
      if (!window.mermaid) { document.body.insertAdjacentHTML('beforeend',
        '<p class="err">Mermaid failed to load (no local mermaid.min.js and no internet).</p>'); return; }
      mermaid.initialize({ startOnLoad: false,
        theme: matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'default' });
      mermaid.run();
    }
  </script>
  <script src="./mermaid.min.js" onload="startMermaid()"
    onerror="var s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/mermaid@10.9.3/dist/mermaid.min.js';s.onload=startMermaid;s.onerror=startMermaid;document.head.appendChild(s);"></script>
</body>
</html>
